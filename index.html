<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>หัวกุญแจ</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1976D2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="หัวกุญแจ">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Sarabun', sans-serif;
      background: #1976D2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      color: white;
      text-align: center;
    }
    .icon-wrap {
      width: 96px; height: 96px;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .icon-wrap img { width:100%; height:100%; }
    .app-name { font-size: 26px; font-weight: 700; }
    .dots { display:flex; gap:8px; }
    .dots span {
      width:10px; height:10px;
      border-radius:50%; background:rgba(255,255,255,0.8);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dots span:nth-child(2) { animation-delay:.2s; }
    .dots span:nth-child(3) { animation-delay:.4s; }
    @keyframes bounce {
      0%,80%,100% { transform:scale(0.6); opacity:0.5; }
      40% { transform:scale(1); opacity:1; }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="icon-wrap">
      <img src="icon-192.png" alt="หัวกุญแจ">
    </div>
    <div class="app-name">หัวกุญแจ</div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyWn7C7e59HUhz3zOA_9mNoncZsnolAxlGZ0qMcjB2HQZbLw7jhaHw9u8SEIddAvG8/exec';

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(()=>{});
    }
    setTimeout(() => { window.location.replace(GAS_URL); }, 800);
  </script>
</body>
</html>
