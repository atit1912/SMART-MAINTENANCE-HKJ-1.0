<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>หัวกุญแจ</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Theme -->
  <meta name="theme-color" content="#1976D2">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="หัวกุญแจ">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Sarabun', sans-serif;
      background: #1976D2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      color: white;
      text-align: center;
      padding: 32px;
    }

    .icon-wrap {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .icon-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .app-name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .loading-dots {
      display: flex;
      gap: 8px;
    }

    .loading-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .loading-dots span:nth-child(1) { animation-delay: 0s; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="icon-wrap">
      <img src="icon-192.png" alt="หัวกุญแจ">
    </div>
    <div class="app-name">หัวกุญแจ</div>
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="subtitle">กำลังโหลด...</div>
  </div>

  <script>
    // ====================================================
    // ⚠️  แก้ URL ตรงนี้เป็น Deployment URL ของ GAS คุณ
    // ====================================================
    const GAS_URL = 'REPLACE_WITH_YOUR_GAS_DEPLOYMENT_URL';
    // ====================================================

    // Register Service Worker (required for PWA install)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    // Redirect ไป GAS หลังจาก splash แสดงสักครู่
    setTimeout(() => {
      window.location.replace(GAS_URL);
    }, 800);
  </script>
</body>
</html>
